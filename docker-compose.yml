version: '3.9'

services:

  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Password123!"
    ports:
      - "1433:1433"

  glms-backend-api:
    build:
      context: ./GLMS.API
    container_name: glms-backend-api
    ports:
      - "7000:8080"
    depends_on:
      - sql-server-db

  glms-frontend-web:
    build:
      context: ./GLMS.Web
    container_name: glms-frontend-web
    ports:
      - "5000:8080"
    depends_on:
      - glms-backend-api